<!DOCTYPE html>
<html lang="en-US">
<head>
    <base href="https://rawcdn.githack.com/genizy/google-class/main/gdlite/">
    <title>School Work</title>
    <link rel="icon" type="image/png" href="images/Icon.png">
    <link rel="stylesheet" href="../style.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="themes/geometrydashlite.io/rs/css/home.css?v=1">
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body { margin: 0; background-image: linear-gradient(rgb(0,0,0), rgb(0,102,255)); overflow: hidden; }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        #loader { position: absolute; left:0; top:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background-image:linear-gradient(rgb(0,0,0),rgb(0,102,255)); }
        .logo { position:absolute; display:block; max-width:100vw; max-height:70vh; top:300px; }
        .pos_progress { position:absolute; bottom:15%; width:100%; }
        .progress { margin:1.5em auto; max-width:436px; height:auto; display:none; position:relative; }
        .full { width:97%; transform-origin:top left; }
        .progress .posfull, .progress .posbox { position:absolute; display:flex; align-items:center; justify-content:center; }
        .progress .posfull { top:8px; z-index:1; } .progress .posbox { top:0; z-index:2; }
        .spinner { margin:10px; font-size:10px; display:none; border-radius:50%; width:5em; height:5em; border-top:1.1em solid rgba(255,255,255,0.2); border-right:1.1em solid rgba(255,255,255,0.2); border-bottom:1.1em solid rgba(255,255,255,0.2); border-left:1.1em solid #fff; animation:spinner-spin 1.1s infinite linear; }
        @keyframes spinner-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        #fullscreen-btn {
            position: fixed; top: 10px; right: 10px; z-index: 999;
            padding: 8px 14px; background: rgba(0,0,0,0.6); color: white;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            backdrop-filter: blur(6px); transition: background 0.2s;
        }
        #fullscreen-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="image/loading.png?v=1">
        <div class="spinner"></div>
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png"></div>
                <div class="posbox"><img class="box_process" src="image/process_bar_front.png"></div>
            </div>
        </div>
        <script src="Build/UnityLoader.js"></script>
        <script>
            var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", { onProgress: UnityProgress });
            function UnityProgress(gameInstance, progress) {
                if (!gameInstance.Module) return;
                const loader = document.querySelector("#loader");
                if (!gameInstance.progress) {
                    const p = document.querySelector("#loader .progress");
                    p.style.display = "block";
                    gameInstance.progress = p.querySelector(".full");
                    loader.querySelector(".spinner").style.display = "none";
                }
                gameInstance.progress.style.transform = `scaleX(${progress})`;
                if (progress === 1 && !gameInstance.removeTimeout) {
                    gameInstance.removeTimeout = setTimeout(() => { loader.style.display = "none"; }, 2000);
                }
            }
        </script>
    </div>
    <script>
        function toggleFullscreen() {
            const btn = document.getElementById("fullscreen-btn");
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                btn.textContent = "✕ Exit Fullscreen";
            } else {
                document.exitFullscreen();
                btn.textContent = "⛶ Fullscreen";
            }
        }
        document.addEventListener("fullscreenchange", () => {
            const btn = document.getElementById("fullscreen-btn");
            btn.textContent = document.fullscreenElement ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
        });
    </script>
</body>
</html>
