<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Work</title>
<link rel="icon" type="image/png" href="images/Icon.png">
<link rel="stylesheet" href="../style.css">
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
iframe { width: 100%; height: 100%; border: none; display: block; }

#clickOverlay {
  position: fixed; inset: 0;
  background: black; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font: bold 26px Arial;
  cursor: pointer; z-index: 9999;
}

#fullscreen-btn {
  position: fixed;
  top: 10px; right: 10px;
  z-index: 999;
  padding: 8px 14px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: background 0.2s;
  display: none;
}
#fullscreen-btn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<iframe id="gameFrame" allowfullscreen></iframe>
<div id="clickOverlay">CLICK ANYWHERE TO START</div>
<button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<script>
const DB_NAME = 'GameCacheDB';
const STORE_NAME = 'GameFiles';
const CACHE_DURATION = 90 * 24 * 60 * 60 * 1000;
const FILE_URL = 'https://cdn.jsdelivr.net/gh/netclassroom/felek@main/googlx6.xml';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'url' });
    request.onsuccess = e => resolve(e.target.result);
    request.onerror = e => reject(e.target.error);
  });
}

async function saveToCache(url, content) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put({ url, content, timestamp: Date.now() }).onsuccess = resolve;
    tx.onerror = () => reject("Cache write error");
  });
}

async function getFileFromCache(url) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    tx.objectStore(STORE_NAME).get(url).onsuccess = async (e) => {
      const data = e.target.result;
      if (data && (Date.now() - data.timestamp) < CACHE_DURATION) { resolve(data.content); return; }
      try {
        const text = await (await fetch(url)).text();
        await saveToCache(url, text);
        resolve(text);
      } catch (err) { reject(err); }
    };
    tx.onerror = () => reject("Cache read error");
  });
}

const frame = document.getElementById("gameFrame");

async function loadGame() {
  try {
    const html = await getFileFromCache(FILE_URL);
    frame.contentDocument.open();
    frame.contentDocument.write(html);
    frame.contentDocument.close();
  } catch (err) {
    console.error(err);
    alert("Game failed to load.");
  }
}

const overlay = document.getElementById("clickOverlay");
const btn = document.getElementById("fullscreen-btn");

overlay.addEventListener("click", async () => {
  if (!document.fullscreenElement) {
    try { await document.documentElement.requestFullscreen(); } catch(e) {}
  }
  overlay.remove();
  btn.style.display = "block";
  loadGame();
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    btn.textContent = "✕ Exit Fullscreen";
  } else {
    document.exitFullscreen();
    btn.textContent = "⛶ Fullscreen";
  }
}

document.addEventListener("fullscreenchange", () => {
  btn.textContent = document.fullscreenElement ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
});
</script>

</body>
</html>
