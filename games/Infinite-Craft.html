<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Work</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="images/Icon.png">
    <style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
iframe { width: 100%; height: 100%; border: none; display: block; }

#clickOverlay {
  position: fixed; inset: 0;
  background: black; color: white;
  display: flex; align-items: center; justify-content: center;
  font: bold 26px Arial;
  cursor: pointer; z-index: 9999;
}

#fullscreen-btn {
  position: fixed;
  top: 10px; right: 10px;
  z-index: 999;
  padding: 8px 14px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: background 0.2s;
  display: none;
}
#fullscreen-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<iframe
  id="gameFrame"
  src="https://infinite-craft.com/"
  allow="fullscreen *"
  sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-downloads allow-modals allow-top-navigation-by-user-activation allow-storage-access-by-user-activation">
</iframe>

<div id="clickOverlay">CLICK ANYWHERE TO PLAY</div>
<button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<script>
const overlay = document.getElementById("clickOverlay");
const btn = document.getElementById("fullscreen-btn");

overlay.addEventListener("click", async () => {
  if (!document.fullscreenElement) {
    try { await document.documentElement.requestFullscreen(); } catch(e) {}
  }
  overlay.remove();
  btn.style.display = "block";
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    btn.textContent = "✕ Exit Fullscreen";
  } else {
    document.exitFullscreen();
    btn.textContent = "⛶ Fullscreen";
  }
}

document.addEventListener("fullscreenchange", () => {
  btn.textContent = document.fullscreenElement ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
});
</script>

</body>
</html>
