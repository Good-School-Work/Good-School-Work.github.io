<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Classroom</title>
  <link rel="icon" type="image/png" href="../images/Icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
      from { text-shadow: 0 0 20px rgba(255,255,255,0.3); }
      to { text-shadow: 0 0 30px rgba(255,255,255,0.6); }
    }
    
    .instruction {
      font-size: 1.3em;
      margin: 30px 0;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    
    .volume-warning {
      font-size: 2em;
      color: #ff6b6b;
      font-weight: bold;
      margin: 20px 0;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .play-btn {
      font-size: 1.5em;
      padding: 20px 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 30px;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .play-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }
    
    .play-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #game-screen {
      display: none;
      text-align: center;
    }
    
    .mystery-text {
      font-size: 1.8em;
      margin: 40px 0;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    .loading {
      font-size: 1.2em;
      margin: 20px 0;
    }
    
    .dot {
      animation: blink 1.4s infinite;
    }
    
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes blink {
      0%, 20% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    #scare-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    
    #scare-screen.active {
      display: flex;
    }
    
    .scare-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: shake 0.05s infinite, scaleUp 0.15s;
      filter: brightness(1.2) contrast(1.3);
    }
    
    @keyframes shake {
      0% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
      10% { transform: translate(-8px, 8px) rotate(-3deg) scale(1.12); }
      20% { transform: translate(8px, -8px) rotate(3deg) scale(1.09); }
      30% { transform: translate(-6px, -6px) rotate(-2deg) scale(1.11); }
      40% { transform: translate(6px, 6px) rotate(2deg) scale(1.1); }
      50% { transform: translate(-4px, 4px) rotate(-1deg) scale(1.12); }
      60% { transform: translate(4px, -4px) rotate(1deg) scale(1.09); }
      70% { transform: translate(-3px, -3px) rotate(-2deg) scale(1.11); }
      80% { transform: translate(3px, 3px) rotate(2deg) scale(1.1); }
      90% { transform: translate(-2px, 2px) rotate(-1deg) scale(1.12); }
      100% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
    }
    
    @keyframes scaleUp {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1.1); opacity: 1; }
    }
    
    .checkbox-container {
      margin: 20px 0;
      font-size: 1.1em;
    }
    
    .checkbox-container input {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      cursor: pointer;
    }
    
    .checkbox-container label {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="start-screen">
      <h1>🎮 Mystery Game 🎮</h1>
      <div class="instruction">
        Welcome to the Mystery Game!<br>
        This is a special audio-based experience.
      </div>
      <div class="volume-warning">
        ⚠️ TURN YOUR VOLUME TO MAX ⚠️
      </div>
      <div class="instruction">
        For the best experience, you MUST have your volume at 100%.<br>
        The game uses very quiet sounds that you need to hear clearly.
      </div>
      <div class="checkbox-container">
        <input type="checkbox" id="volume-check">
        <label for="volume-check">✓ I confirm my volume is at maximum (100%)</label>
      </div>
      <button class="play-btn" id="start-btn" disabled>START GAME</button>
    </div>
    
    <div id="game-screen">
      <div class="mystery-text">Initializing mystery sequence...</div>
      <div class="loading">
        <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </div>
    </div>
  </div>
  
  <div id="scare-screen">
    <img class="scare-image" src="https://i.pinimg.com/originals/7f/5f/2b/7f5f2b22d757e61b6ade6e6c51e0def3.gif" alt="JUMPSCARE">
  </div>

    function playScareSound() {
      scareAudio.currentTime = 0;
      scareAudio.play().catch(e => console.log('Audio failed:', e));
    }
    
    startBtn.addEventListener('click', function() {
      if (!volumeCheck.checked) return;
      
      startScreen.style.display = 'none';
      gameScreen.style.display = 'block';
      
      const mysteryText = document.querySelector('.mystery-text');
      
      setTimeout(() => { mysteryText.textContent = 'Analyzing audio levels...'; }, 2000);
      setTimeout(() => { mysteryText.textContent = 'Calibrating sound system...'; }, 4000);
      setTimeout(() => { mysteryText.textContent = 'Preparing experience...'; }, 6000);
      setTimeout(() => { mysteryText.textContent = 'Almost ready...'; }, 8000);
      setTimeout(() => { mysteryText.textContent = 'Get ready...'; }, 9500);
      
      setTimeout(() => {
        scareScreen.classList.add('active');
        playScareSound();
        
        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200, 100, 200]);
        }
        
        setTimeout(() => {
          scareScreen.classList.remove('active');
          gameScreen.style.display = 'none';
          startScreen.style.display = 'block';
          mysteryText.textContent = 'Initializing mystery sequence...';
          volumeCheck.checked = false;
          startBtn.disabled = true;
          
          const instruction = document.querySelector('.instruction');
          instruction.innerHTML = '😂 GOT YOU! 😂<br><br>Hope that wasn\'t too loud! 👻<br><br>Want to try again?';
        }, 3000);
      }, 10000);
    });
  </script>
