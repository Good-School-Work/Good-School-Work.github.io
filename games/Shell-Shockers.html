<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Classroom</title>
  <link rel="icon" type="image/png" href="../images/Icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    #fullscreen-btn {
      position: fixed; top: 10px; right: 10px; z-index: 999;
      padding: 8px 14px; background: rgba(0,0,0,0.6); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      backdrop-filter: blur(6px); transition: background 0.2s;
    }
    #fullscreen-btn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  <iframe src="https://shellbros.pages.dev/" allowfullscreen allow="fullscreen; autoplay; gamepad"></iframe>
  <script>
    function toggleFullscreen() {
      const btn = document.getElementById("fullscreen-btn");
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        btn.textContent = "✕ Exit Fullscreen";
      } else {
        document.exitFullscreen();
        btn.textContent = "⛶ Fullscreen";
      }
    }
    document.addEventListener("fullscreenchange", () => {
      const btn = document.getElementById("fullscreen-btn");
      btn.textContent = document.fullscreenElement ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
    });
  </script>
</body>
</html>
