<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Work</title>
  <link rel="icon" type="image/png" href="images/Icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/drippy-cat/snowrider3D@c82fe583cbffafa502b0aa3ed2da0053972e0c80/TemplateData/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; }

    #fullscreen-btn {
      position: fixed;
      top: 10px; right: 10px;
      z-index: 999;
      padding: 8px 14px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    #fullscreen-btn:hover { background: rgba(255,255,255,0.2); }

    .webgl-content {
      width: 100%; height: 100vh;
    }
    #gameContainer {
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>

  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

  <div class="webgl-content">
    <div id="gameContainer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/drippy-cat/snowrider3D@c82fe583cbffafa502b0aa3ed2da0053972e0c80/TemplateData/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/drippy-cat/snowrider3D@c82fe583cbffafa502b0aa3ed2da0053972e0c80/Build/UnityLoader.js"></script>
  <script>
    var gameInstance = UnityLoader.instantiate(
      "gameContainer",
      "https://cdn.jsdelivr.net/gh/drippy-cat/snowrider3D@c82fe583cbffafa502b0aa3ed2da0053972e0c80/Build/SnowRider3D-gd-1.json",
      { onProgress: UnityProgress, Module: { onRuntimeInitialized: function() { UnityProgress(gameInstance, "complete"); } } }
    );

    function toggleFullscreen() {
      const btn = document.getElementById("fullscreen-btn");
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        btn.textContent = "✕ Exit Fullscreen";
      } else {
        document.exitFullscreen();
        btn.textContent = "⛶ Fullscreen";
      }
    }

    document.addEventListener("fullscreenchange", () => {
      const btn = document.getElementById("fullscreen-btn");
      btn.textContent = document.fullscreenElement ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
    });
  </script>

</body>
</html>
